services:
  bluelink-token:
    image: ghcr.io/tma84/bluelink-token:latest
    container_name: bluelink-token
    ports:
      - "9876:9876"
      - "6080:6080"
    environment:
      - BRAND=auto              # auto, hyundai, or kia
      - BLUELINK_USERNAME=      # Bluelink email (optional, for auto-fill)
      - BLUELINK_PASSWORD=      # Bluelink password (optional, for auto-fill)
      - EVCC_URL=               # e.g. http://192.168.1.100:7070 (optional)
      - EVCC_PASSWORD=          # evcc admin password (optional)
    shm_size: 256m
    command: ["/run-standalone.sh"]
    restart: unless-stopped
