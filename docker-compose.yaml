services:
  bluelink-token:
    image: ghcr.io/tma84/bluelink-token:latest
    container_name: bluelink-token
    ports:
      - "9876:9876"   # Web UI
    volumes:
      - bluelink-data:/data   # persists token expiry info across restarts
    environment:
      # Vehicle brand: auto (show selector), eu_hyundai, or eu_kia
      - BRAND=auto
      # Bluelink credentials — required for token generation
      - BLUELINK_USERNAME=
      - BLUELINK_PASSWORD=
      # evcc connection (optional) — auto-transfers the token to evcc
      - EVCC_URL=
      - EVCC_PASSWORD=
    command: ["/run-standalone.sh"]
    restart: unless-stopped

volumes:
  bluelink-data:
