services:
  bluelink-token:
    image: ghcr.io/tma84/bluelink-token:latest
    container_name: bluelink-token
    ports:
      - "9876:9876"
      - "6080:6080"
    environment:
      - BRAND=auto              # auto, hyundai, or kia
      - BLUELINK_USERNAME=      # Bluelink email (optional, for auto-fill)
      - BLUELINK_PASSWORD=      # Bluelink password (optional, for auto-fill)
      - EVCC_URL=               # e.g. http://192.168.1.100:7070 (optional)
      - EVCC_PASSWORD=          # evcc admin password (optional)
      - DISPLAY=:99
      - DBUS_SESSION_BUS_ADDRESS=/dev/null
    shm_size: 256m
    command: >
      sh -c "Xvfb :99 -screen 0 1280x800x24 -ac &
      sleep 1 && openbox &
      sleep 1 && x11vnc -display :99 -forever -nopw -shared -rfbport 5900 &
      sleep 1 && websockify --web /usr/share/novnc 6080 localhost:5900 &
      sleep 1 && source /opt/venv/bin/activate &&
      gunicorn --bind 0.0.0.0:9876 --workers 1 --threads 4 --timeout 300 web:app"
    restart: unless-stopped
