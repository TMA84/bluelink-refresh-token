name: Build Windows Executable

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r standalone/requirements.txt

      - name: Build executable
        run: |
          cd standalone
          pyinstaller --onefile --name BluelinkTokenGenerator --add-data "web.py;." --hidden-import curl_cffi --hidden-import Crypto --collect-all curl_cffi --collect-all Crypto bluelink_token.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BluelinkTokenGenerator-Windows
          path: standalone/dist/BluelinkTokenGenerator.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          gh release upload $version standalone/dist/BluelinkTokenGenerator.exe --clobber
