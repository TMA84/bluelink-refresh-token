name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: bluelink-token
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check.outputs.created }}
      registry_prefix: ${{ steps.lower.outputs.registry_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase registry prefix
        id: lower
        run: |
          echo "registry_prefix=$(echo '${{ env.REGISTRY_PREFIX }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' bluelink-token/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" 'BEGIN{p=0} $0 ~ "^## "ver{p=1; next} /^## [0-9]/{p=0} p' CHANGELOG.md | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES"

  # ── Container Images ────────────────────────────────────────

  init:
    name: Initialize container build
    needs: release
    if: needs.release.outputs.created == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ needs.release.outputs.registry_prefix }}

  build-container:
    name: Build ${{ matrix.arch }} container
    needs: [release, init]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.release.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.release.outputs.version }}
          context: bluelink-token

  manifest:
    name: Publish multi-arch manifest
    needs: [release, init, build-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ needs.release.outputs.registry_prefix }}
          image-tags: |
            ${{ needs.release.outputs.version }}
            latest

      - name: Update release with image references
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PREFIX="${{ needs.release.outputs.registry_prefix }}"
          EXISTING=$(gh release view "v${VERSION}" --json body -q .body)
          IMAGES=$(cat <<EOF

          ---

          ### Container Images

          \`\`\`
          docker pull ${PREFIX}/bluelink-token:${VERSION}
          \`\`\`

          | Image | Tag |
          |-------|-----|
          | \`${PREFIX}/bluelink-token\` | \`${VERSION}\`, \`latest\` |
          | \`${PREFIX}/amd64-bluelink-token\` | \`${VERSION}\`, \`latest\` |
          | \`${PREFIX}/aarch64-bluelink-token\` | \`${VERSION}\`, \`latest\` |
          EOF
          )
          gh release edit "v${VERSION}" --notes "${EXISTING}${IMAGES}"

  # ── Standalone Apps ─────────────────────────────────────────

  build-standalone:
    name: Build ${{ matrix.os_name }} standalone
    needs: release
    if: needs.release.outputs.created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_name: Windows
          - runner: ubuntu-latest
            os_name: Linux
          - runner: macos-latest
            os_name: macOS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r standalone/requirements.txt

      - name: Build executable (Windows)
        if: matrix.os_name == 'Windows'
        run: |
          cd standalone
          pyinstaller --onefile --name BluelinkTokenGenerator.exe --add-data "web.py;." --hidden-import curl_cffi --hidden-import Crypto --collect-all curl_cffi --collect-all Crypto bluelink_token.py

      - name: Build executable (Linux)
        if: matrix.os_name == 'Linux'
        run: |
          cd standalone
          pyinstaller --onefile --name BluelinkTokenGenerator-Linux --add-data "web.py:." --hidden-import curl_cffi --hidden-import Crypto --collect-all curl_cffi --collect-all Crypto bluelink_token.py

      - name: Create Linux AppImage
        if: matrix.os_name == 'Linux'
        run: |
          cd standalone
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/BluelinkTokenGenerator-Linux AppDir/usr/bin/BluelinkTokenGenerator
          cp ../bluelink-token/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/bluelink-token.png
          cp ../bluelink-token/icon.png AppDir/bluelink-token.png
          cat > AppDir/BluelinkTokenGenerator.desktop << 'EOF'
          [Desktop Entry]
          Name=Bluelink Token Generator
          Exec=BluelinkTokenGenerator
          Icon=bluelink-token
          Type=Application
          Categories=Utility;
          Comment=Generate Hyundai/Kia Bluelink refresh tokens
          EOF
          sed -i 's/^          //' AppDir/BluelinkTokenGenerator.desktop
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/BluelinkTokenGenerator" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream AppDir dist/BluelinkTokenGenerator-Linux.AppImage

      - name: Build macOS .app bundle
        if: matrix.os_name == 'macOS'
        run: |
          cd standalone
          pyinstaller --windowed --onefile --name "Bluelink Token Generator" --add-data "web.py:." --hidden-import curl_cffi --hidden-import Crypto --collect-all curl_cffi --collect-all Crypto bluelink_token.py

      - name: Create macOS DMG
        if: matrix.os_name == 'macOS'
        run: |
          cd standalone/dist
          mkdir -p dmg_contents
          cp -R "Bluelink Token Generator.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "Bluelink Token Generator" -srcfolder dmg_contents -ov -format UDZO "BluelinkTokenGenerator-macOS.dmg"

      - name: Upload artifact (Windows)
        if: matrix.os_name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: BluelinkTokenGenerator.exe
          path: standalone/dist/BluelinkTokenGenerator.exe

      - name: Upload artifact (Linux)
        if: matrix.os_name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: BluelinkTokenGenerator-Linux.AppImage
          path: standalone/dist/BluelinkTokenGenerator-Linux.AppImage

      - name: Upload artifact (macOS)
        if: matrix.os_name == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: BluelinkTokenGenerator-macOS.dmg
          path: standalone/dist/BluelinkTokenGenerator-macOS.dmg

      - name: Upload to release (Windows)
        if: matrix.os_name == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" standalone/dist/BluelinkTokenGenerator.exe --clobber

      - name: Upload to release (Linux)
        if: matrix.os_name == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" standalone/dist/BluelinkTokenGenerator-Linux.AppImage --clobber

      - name: Upload to release (macOS)
        if: matrix.os_name == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" standalone/dist/BluelinkTokenGenerator-macOS.dmg --clobber
