name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: bluelink-token

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check.outputs.created }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' bluelink-token/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract release notes for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION}\$/,/^## [0-9]/" CHANGELOG.md | sed '1d;/^## [0-9]/d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES"

  init:
    name: Initialize build
    needs: release
    if: needs.release.outputs.created == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: [release, init]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            v${{ needs.release.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.release.outputs.version }}
          context: bluelink-token

  manifest:
    name: Publish multi-arch manifest
    needs: [release, init, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            v${{ needs.release.outputs.version }}
            latest

      - name: Update release with image references
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          EXISTING=$(gh release view "v${VERSION}" --json body -q .body)
          IMAGES=$(cat <<EOF

          ---

          ### Container Images

          \`\`\`
          docker pull ghcr.io/${OWNER}/bluelink-token:v${VERSION}
          \`\`\`

          | Image | Tag |
          |-------|-----|
          | [\`ghcr.io/${OWNER}/bluelink-token\`](https://ghcr.io/${OWNER}/bluelink-token) | \`v${VERSION}\`, \`latest\` |
          | [\`ghcr.io/${OWNER}/amd64-bluelink-token\`](https://ghcr.io/${OWNER}/amd64-bluelink-token) | \`v${VERSION}\`, \`latest\` |
          | [\`ghcr.io/${OWNER}/aarch64-bluelink-token\`](https://ghcr.io/${OWNER}/aarch64-bluelink-token) | \`v${VERSION}\`, \`latest\` |
          EOF
          )
          gh release edit "v${VERSION}" --notes "${EXISTING}${IMAGES}"
