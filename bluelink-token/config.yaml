name: "Bluelink Token Generator"
description: "Generate Hyundai/Kia Bluelink refresh tokens for evcc and Home Assistant"
version: "4.2.0"
slug: "bluelink_token"
image: "ghcr.io/tma84/bluelink-token"
arch:
  - aarch64
  - amd64
url: "https://github.com/TMA84/bluelink-refresh-token"
startup: services
init: false
hassio_api: true
homeassistant_api: true
ports:
  9876/tcp: 9876
  6080/tcp: 6080
webui: "http://[HOST]:[PORT:9876]/"
options:
  brand: "auto"
  country: "DE"
schema:
  brand: list(auto|hyundai|kia|eu_hyundai|eu_kia)
  country: str?
  username: str?
  password: password?
  show_all_regions: bool?
  evcc_url: str?
  evcc_password: password?
