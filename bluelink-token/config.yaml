name: "Bluelink Token Generator"
description: "Generate Hyundai/Kia Bluelink refresh tokens for evcc and Home Assistant"
version: "2.6.0"
slug: "bluelink_token"
image: "ghcr.io/tma84/bluelink-token-{arch}"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
url: "https://github.com/TMA84/bluelink-refresh-token"
startup: services
init: false
ports:
  9876/tcp: 9876
  6080/tcp: 6080
webui: "http://[HOST]:[PORT:9876]/"
options:
  brand: "hyundai"
  username: ""
  password: ""
schema:
  brand: list(hyundai|kia)
  username: str
  password: password
