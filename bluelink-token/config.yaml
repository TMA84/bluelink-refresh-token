name: "Bluelink Token Generator"
description: "Generate Hyundai/Kia Bluelink refresh tokens for evcc and Home Assistant"
version: "6.3.3"
slug: "bluelink_token"
image: "ghcr.io/tma84/bluelink-token"
arch:
  - aarch64
  - amd64
url: "https://github.com/TMA84/bluelink-refresh-token"
startup: services
init: false
hassio_api: true
homeassistant_api: true
ports:
  9876/tcp: 9876
ingress: true
ingress_port: 9876
panel_icon: "mdi:car-key"
panel_title: "Bluelink Token"
webui: "http://[HOST]:[PORT:9876]/"
options:
  vehicles: []
  country: "DE"
  evcc_url: ""
  evcc_password: ""
  api_token: ""
schema:
  vehicles:
    - brand: list(eu_kia|eu_hyundai)
      username: str
      password: password
  country: str?
  evcc_url: str?
  evcc_password: password?
  api_token: password?
